syntax = "proto3";

option optimize_for = LITE_RUNTIME;
option java_multiple_files = true;
option java_package = "com.github.yoep.popcorn.backend.lib.ipc.protobuf";

package fx.ipc.proto;

import "media.proto";
import "message.proto";

message Playlist {
  repeated Playlist.Item items = 1;

  message Item {
    string url = 1;
    string title = 2;
    optional string caption = 3;
    optional string thumb = 4;
    optional string quality = 5;
    optional Media.Item parent_media = 6;
    optional Media.Item media = 7;
    optional uint64 auto_resume_timestamp = 8;
    bool subtitles_enabled = 9;
    optional string torrent_filename = 10;
  }

  enum State {
    IDLE = 0;
    PLAYING = 1;
    STOPPED = 2;
    COMPLETED = 3;
    ERROR = 4;
  }
}

message PlayPlaylistRequest {
  Playlist playlist = 1;
}

message PlayPlaylistResponse {
  optional Handle handle = 1;
}

message PlayNextPlaylistItemRequest {}

message PlayNextPlaylistItemResponse {
  optional Handle handle = 1;
}

message StopPlaylistRequest {}

message GetActivePlaylistRequest {}

message GetActivePlaylistResponse {
  Playlist playlist = 1;
}

message PlayNext {
  Type type = 1;
  optional Next next = 2;

  message Next {
    Playlist.Item item = 1;
  }

  enum Type {
    NEXT = 0; // The next item in the playlist will start playing.
    END = 1;  // The playlist has reached the end and no more items can be played.
  }
}

message PlaylistEvent {
  Event event = 1;
  optional PlayNextChanged play_next_changed = 2;
  optional PlayingNextIn playing_next_in = 3;
  optional StateChanged state_changed = 4;

  message PlayNextChanged {
    PlayNext next = 1;
  }

  message PlayingNextIn {
    uint32 playing_in_seconds = 1;
  }

  message StateChanged {
    Playlist.State state = 1;
  }

  enum Event {
    PLAYLIST_CHANGED = 0;         // Invoked when a new playlist has been set.
    PLAY_NEXT_CHANGED = 1;        // Invoked when the next item in the playlist has been changed.
    PLAYING_NEXT_IN = 2;          // Invoked when the next item in the playlist will start playing in X seconds.
    PLAYING_NEXT_IN_ABORTED = 3;  // Invoked when the player time has been rewind and the playing next in does no longer count.
    STATE_CHANGED = 4;            // Invoked when the state of the playlist has changed.
  }
}